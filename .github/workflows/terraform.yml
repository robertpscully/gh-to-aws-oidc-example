name: Terraform Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: eu-west-2
  TF_VERSION: "1.14.6"
  PLAN_BUCKET: robertscully-terraform-s3-backend
  PLAN_KEY: plan-files/run-${{ github.run_id }}.tfplan

jobs:
  terraform-plan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -input=false

      - name: Terraform Plan (PR)
        if: github.event_name == 'pull_request'
        working-directory: terraform
        run: terraform plan -input=false

      - name: Terraform Plan (apply run)
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        working-directory: terraform
        run: terraform plan -out=plan.tfplan -input=false

      - name: Upload plan to S3
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: aws s3 cp terraform/plan.tfplan s3://${{ env.PLAN_BUCKET }}/${{ env.PLAN_KEY }}

  approval:
    needs: terraform-plan
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Approved
        run: echo "Deployment approved — proceeding with apply"

  terraform-apply:
    needs: approval
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -input=false

      - name: Download plan from S3
        run: aws s3 cp s3://${{ env.PLAN_BUCKET }}/${{ env.PLAN_KEY }} terraform/plan.tfplan

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -input=false -auto-approve plan.tfplan

      - name: Delete plan from S3
        if: always()
        run: aws s3 rm s3://${{ env.PLAN_BUCKET }}/${{ env.PLAN_KEY }}
